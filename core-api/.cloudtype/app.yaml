# Cloudtype 배포 설정 (Core API).
#
# 사전 준비:
# 1. Cloudtype 프로젝트에 PostgreSQL(또는 MySQL) 애드온을 추가하고, DB 접속
#    문자열을 프로젝트 시크릿 "immigration-advisor-database-url"로 저장한다.
#    (postgresql+psycopg2://user:password@host:5432/dbname 형식)
# 2. ml-service HF Space에 설정한 것과 정확히 동일한 값을 시크릿
#    "internal-service-token"으로 저장한다.
# 3. 배포된 ml-service의 실제 HF Space 도메인을 변수 "ml-service-url"에 저장한다
#    (예: https://<username>-immigration-advisor-ml.hf.space).
# 4. 프론트엔드 배포 후 발급되는 도메인을 "frontend-origin" 변수로 저장한다.

name: immigration-advisor-core-api
app: dockerfile
options:
  ports: 8000
  dockerfile: core-api/Dockerfile
  env:
    - name: DATABASE_URL
      secret: immigration-advisor-database-url
    - name: INTERNAL_SERVICE_TOKEN
      secret: internal-service-token
    - name: ML_SERVICE_URL
      var: ml-service-url
    - name: CORS_ALLOWED_ORIGINS
      var: frontend-origin
context:
  git:
    url: https://github.com/saySthAbout/immigration-advisor.git
    branch: main
  preset: dockerfile
